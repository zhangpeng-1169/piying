<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录 · 陕西皮影戏</title>
  <style>
    :root {
      --color-cream: #F5E6D3; --color-cream-light: #FAF3E8; --color-cream-dark: #E8D5B7;
      --color-brown: #4A2C17; --color-brown-light: #6B4423; --color-brown-dark: #3D2314;
      --color-gold: #C9A227; --color-error: #B33A3A; --nav-height: 64px; --transition: 0.3s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: "Noto Serif SC", "SimSun", serif; background: var(--color-cream-light); color: var(--color-brown); line-height: 1.8; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    .navbar { position: fixed; top: 0; left: 0; width: 100%; height: var(--nav-height); background: rgba(61,35,20,0.95); z-index: 1000; }
    .navbar-inner { max-width: 1200px; height: 100%; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; color: var(--color-cream); font-size: 1.25rem; font-weight: bold; }
    .logo-icon { width: 36px; height: 36px; background: var(--color-gold); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--color-brown-dark); }
    .nav-links { display: flex; gap: 8px; }
    .nav-links a { color: var(--color-cream); padding: 8px 14px; border-radius: 4px; font-size: 0.9rem; }
    .nav-links a:hover { background: var(--color-gold); color: var(--color-brown-dark); }
    .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 8px; background: none; border: none; }
    .menu-toggle span { display: block; width: 24px; height: 2px; background: var(--color-cream); }
    .login-page { min-height: 100vh; padding: calc(var(--nav-height) + 48px) 24px 48px; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 420px; background: var(--color-cream); border: 1px solid var(--color-cream-dark); border-radius: 10px; padding: 40px 36px; box-shadow: 0 8px 28px rgba(74,44,23,0.12); }
    .login-box h1 { text-align: center; font-size: 1.5rem; color: var(--color-brown-dark); letter-spacing: 4px; margin-bottom: 8px; }
    .login-box > p { text-align: center; font-size: 0.9rem; color: var(--color-brown-light); margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.92rem; }
    .form-group input[type="text"], .form-group input[type="password"], .form-group input[type="email"] {
      width: 100%; padding: 12px 14px; border: 1px solid var(--color-cream-dark); border-radius: 4px; font-family: inherit; font-size: 1rem;
    }
    .form-group input:focus { outline: 2px solid var(--color-gold); }
    .form-group input.error { border-color: var(--color-error); }
    .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; }
    .checkbox-group input { width: 16px; height: 16px; }
    .error-msg { color: var(--color-error); font-size: 0.82rem; margin-top: 4px; display: none; }
    .error-msg.show { display: block; }
    .submit-btn { width: 100%; padding: 14px; margin-top: 8px; background: var(--color-brown-dark); color: var(--color-cream); border: none; border-radius: 4px; font-size: 1rem; font-family: inherit; cursor: pointer; transition: background var(--transition); }
    .submit-btn:hover { background: var(--color-gold); color: var(--color-brown-dark); }
    .login-tip { text-align: center; margin-top: 20px; font-size: 0.85rem; color: var(--color-brown-light); }
  </style>
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/nav.css">
  <link rel="stylesheet" href="css/theme.css">
</head>
<body>
  <div class="search-toast" id="searchToast"><h4>搜索结果</h4><p id="searchToastText"></p></div>
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="logo"><div class="logo-icon">影</div><span>陕西皮影戏</span></a>
      <div class="nav-right">
        <form class="nav-search" id="navSearchForm" role="search">
          <input type="search" id="searchInput" placeholder="搜索非遗..." aria-label="搜索">
          <button type="submit">搜索</button>
        </form>
        <button class="menu-toggle" id="menuToggle" aria-label="打开菜单"><span></span><span></span><span></span></button>
        <ul class="nav-links" id="navLinks">
          <li><a href="index.html">首页</a></li>
          <li class="nav-dropdown">
            <a href="overview.html">非遗概述</a>
            <ul class="dropdown-menu">
              <li><a href="overview.html#folk">民间文学</a></li>
              <li><a href="overview.html#music">传统音乐</a></li>
              <li><a href="overview.html#drama">传统戏剧</a></li>
              <li><a href="projects.html">皮影技艺</a></li>
            </ul>
          </li>
          <li><a href="inheritros.html">非遗传承</a></li>
          <li><a href="activity.html">非遗体验</a></li>
          <li><a href="mall.html">非遗商城</a></li>
          <li><a href="news.html">文化资讯</a></li>
          <li><a href="contact.html">联系我们</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="login-page">
    <div class="login-box">
      <h1>用户登录</h1>
      <p>登录后可预约体验、查看订单（课程演示）</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="username">用户名 / 邮箱</label>
          <input type="text" id="username" name="username" placeholder="请输入用户名或邮箱" autocomplete="username">
          <p class="error-msg" id="userError">用户名不能为空</p>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password">
          <p class="error-msg" id="passError">密码不能少于6位</p>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">记住我</label>
        </div>
        <button type="submit" class="submit-btn">登 录</button>
      </form>
      <p class="login-tip">还没有账号？<a href="activity.html">先预约体验 →</a></p>
    </div>
  </main>

  <script src="js/nav.js"></script>
  <script src="js/search.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var user = document.getElementById('username');
      var pass = document.getElementById('password');
      var ok = true;
      if (!user.value.trim()) { document.getElementById('userError').classList.add('show'); user.classList.add('error'); ok = false; }
      else { document.getElementById('userError').classList.remove('show'); user.classList.remove('error'); }
      if (pass.value.length < 6) { document.getElementById('passError').classList.add('show'); pass.classList.add('error'); ok = false; }
      else { document.getElementById('passError').classList.remove('show'); pass.classList.remove('error'); }
      if (ok) alert('登录成功！（课程演示，无真实后端）');
    });
  </script>
</body>
</html>
